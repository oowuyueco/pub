        //äŧååūåN ååŦå―åįåNäļŠ  cnindex
        Array.prototype.cal9č―Ž = function (å―åäšĪææĨæ, priod, N = 5) {
            var candleList = this
            if (candleList.length < 20) return candleList

            for (let endIndex = candleList.length - 1; candleList.length - N <= endIndex; endIndex--) {

                if (endIndex == candleList.length - 1) {
                    if (priod == "week" && new Date(å―åäšĪææĨæ).getDay() < 3) continue
                    if (priod == "month" && +å―åäšĪææĨæ.substring(8, 10) < 18) continue
                }

                let is9č―Žup = true
                let is9č―Ždown = true
                for (var i = 0; i <= 8; i++) {
                    is9č―Ždown = is9č―Ždown && (candleList[endIndex - i - 4].close > candleList[endIndex - i].close)
                    is9č―Žup = is9č―Žup && (candleList[endIndex - i - 4].close < candleList[endIndex - i].close)
                }

                if (is9č―Žup) {
                    for (var i = 0; i <= 8; i++)
                        candleList[endIndex - i]["is9č―Žup"] = 9 - i
                    //break
                }
                if (is9č―Ždown) {
                    for (var i = 0; i <= 8; i++)
                        candleList[endIndex - i]["is9č―Ždown"] = 9 - i
                    //break
                }
            }

            return candleList
        }

                } else {
                    if (applyDay) chartDay.applyNewData(currentDayList)
                    if (applyWeek) chartWeek.applyNewData(currentWeekList)
                    chartMonth.applyNewData(currentMonthList)
                }
                currentDayIndex++ //for3
            }, 1)
        }

    </script>
