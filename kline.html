        //дїОеРОеЊАеЙНN еМЕеРЂељУеЙНзЪДеЙНNдЄ™  cnindex
        Array.prototype.cal9иљђ = function (ељУеЙНдЇ§жШУжЧ•жЬЯ, priod, N = 5) {
            var candleList = this
            if (candleList.length < 20) return candleList

            for (let endIndex = candleList.length - 1; candleList.length - N <= endIndex; endIndex--) {

                if (endIndex == candleList.length - 1) {
                    if (priod == "week" && new Date(ељУеЙНдЇ§жШУжЧ•жЬЯ).getDay() < 3) continue
                    if (priod == "month" && +ељУеЙНдЇ§жШУжЧ•жЬЯ.substring(8, 10) < 18) continue
                }

                let is9иљђup = true
                let is9иљђdown = true
                for (var i = 0; i <= 8; i++) {
                    is9иљђdown = is9иљђdown && (candleList[endIndex - i - 4].close > candleList[endIndex - i].close)
                    is9иљђup = is9иљђup && (candleList[endIndex - i - 4].close < candleList[endIndex - i].close)
                }

                if (is9иљђup) {
                    for (var i = 0; i <= 8; i++)
                        candleList[endIndex - i]["is9иљђup"] = 9 - i
                    //break
                }
                if (is9иљђdown) {
                    for (var i = 0; i <= 8; i++)
                        candleList[endIndex - i]["is9иљђdown"] = 9 - i
                    //break
                }
            }

            return candleList
        }

                    forSetInterval(endIndex, endIndex, dayDatas, true)
                }

                if (mouseLeftDown && downDrag && dragChart == "week") {
                    forSetInterval(endIndex, endIndex, dayDatas, true, true)
                }

                dragChart = ""
                downDrag = false
                mouseLeftDown = false
            })

        });


        function forSetInterval(currentDayIndex, endIndex, dayDatas, applyDay = true, applyWeek = true) {
            let timer = setInterval(function () {
                if (timer && currentDayIndex > endIndex) { //for2
                    clearInterval(timer)
                    return
                }

                let currentDayList = dayDatas.slice(0, currentDayIndex + 1).calKdj().calBoll().maN(10, "close").cal9иљђ().calMacd()
                currentDayList = calculationBias(currentDayList)

                let currentWeekList = dayToPeriod(currentDayList, "week").calKdj().cal9иљђ().calBoll().calMacd().maN(10, 'close')
                currentWeekList = calculationBias(currentWeekList)

                let currentMonthList = dayToPeriod(currentDayList, "month").calKdj().cal9иљђ().calBoll().calMacd()
                    .maN(3, 'close').maN(5, 'close').maN(10, 'close').maN(80, 'close')
                currentMonthList = calculationBias(currentMonthList)

                if (noChart) {
                } else {
                    //applyDayйЗНзљЃеѓєйљР
                    if (applyDay) chartDay.applyNewData(currentDayList)
                    if (applyWeek) chartWeek.applyNewData(currentWeekList)
                    chartMonth.applyNewData(currentMonthList)
                }
                currentDayIndex++ //for3
            }, 1)
        }

    </script>
