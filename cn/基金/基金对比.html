    Array.prototype.cal9转 = function (kline交易日, priod, N = 5) {
      var candleList = this
      if (candleList.length < 20) return candleList

      for (let endIndex = candleList.length - 1; candleList.length - N <= endIndex; endIndex--) {

        if (endIndex == candleList.length - 1) {
          if (priod == "week" && new Date(kline交易日).getDay() < 3) continue
          if (priod == "month" && +kline交易日.substring(8, 10) < 18) continue
        }

        let is9转up = true
        let is9转down = true
        for (var i = 0; i <= 8; i++) {
          is9转down = is9转down && (candleList[endIndex - i - 4].close > candleList[endIndex - i].close)
          is9转up = is9转up && (candleList[endIndex - i - 4].close < candleList[endIndex - i].close)
        }

        if (is9转up) {
          for (var i = 0; i <= 8; i++)
            candleList[endIndex - i]["is9转up"] = 9 - i
          //break
        }
        if (is9转down) {
          for (var i = 0; i <= 8; i++)
            candleList[endIndex - i]["is9转down"] = 9 - i
          //break
        }
      }

      return candleList
    }
    function calDayWeekMonthKline(nameCode, kline交易日) {
      nameCode.currentDayList = []
      nameCode.currentWeekList = []
      nameCode.currentMonthList = []
      let currentDayIndex = nameCode.dayDatas.findIndex(ele => { return ele.date == kline交易日 });
      if (currentDayIndex > 70) {
        let dayStart = (currentDayIndex + 1) - 100 > 0 ? (currentDayIndex + 1) - 100 : 0 //day计算最近100天
        nameCode.currentDayList = nameCode.dayDatas.slice(dayStart, currentDayIndex + 1)
          .calBoll().cal9转(kline交易日, "day").calKdj().calMacd().maN(10, "close")
        nameCode.currentDayList = calculationBias(nameCode.currentDayList)
        nameCode.currentDayList = calculationCci(nameCode.currentDayList)

        let weekDayStart = (currentDayIndex + 1) - 500 > 0 ? (currentDayIndex + 1) - 500 : 0 //week最近100周500天
        nameCode.currentWeekList = dayToPeriod(nameCode.dayDatas.slice(weekDayStart, currentDayIndex + 1), "week")
          .calBoll().cal9转(kline交易日, "week").calKdj().calMacd().maN(10, 'close')
        nameCode.currentWeekList = calculationBias(nameCode.currentWeekList)
        nameCode.currentWeekList = calculationCci(nameCode.currentWeekList)

        let monthDayStart = 0 //month全部
        nameCode.currentMonthList = dayToPeriod(nameCode.dayDatas.slice(monthDayStart, currentDayIndex + 1), "month")
          .calBoll().cal9转(kline交易日, "month").calKdj().calMacd()
          .maN(3, 'close').maN(5, 'close').maN(10, 'close').maN(80, 'close')
        nameCode.currentMonthList = calculationBias(nameCode.currentMonthList)
        nameCode.currentMonthList = calculationCci(nameCode.currentMonthList)
      }
      return nameCode
    }


    function volMaPre(N = 5, periodList, endIndex) {
      if (periodList.length < N + 1) return 0
      let sum = 0
      for (var i = 0; i < N; i++) {
        let currentPeriod = periodList.at(endIndex - i)
        sum += currentPeriod.volume
      }
      return sum / N
    }

    function KDJ死叉(periodList, N = 2, tweaks = 0) {
      for (let index = 1; index <= N; index++) {
        let pre2Period = periodList[periodList.length - (index + 2)]
        let pre1Period = periodList[periodList.length - (index + 1)]
        let currentPeriod = periodList[periodList.length - index]
        let res = (pre1Period.K > pre1Period.D) && (currentPeriod.K <= currentPeriod.D + tweaks)
        if (res) return true
      }
      return false
    }
    function MACD死叉(periodList, N = 2, tweaks = 0) {
      for (let index = 1; index <= N; index++) {
        let pre2Period = periodList[periodList.length - (index + 2)]
        let pre1Period = periodList[periodList.length - (index + 1)]
        let currentPeriod = periodList[periodList.length - index]
        let res = pre1Period.bar > 0 && currentPeriod.bar <= 0 + tweaks
        if (res) return true
      }
      return false
    }
    function CCI死叉(periodList, N = 2) {
      if (periodList.length < 3) return false
      for (let index = 1; index <= N; index++) {
        let pre2Period = periodList[periodList.length - (index + 2)]
        let pre1Period = periodList[periodList.length - (index + 1)]
        let currentPeriod = periodList[periodList.length - index]
        let res = (pre1Period.cci.cci > 100 && currentPeriod.cci.cci < 100) ||
          (pre1Period.cci.cci > 0 && currentPeriod.cci.cci <= 0)
        if (res) return true
      }
      return false

    }
    function 红空红绿(periodList, N = 1, tweaks = 0) {
      for (let index = 1; index <= N; index++) {
        let pre2Period = periodList[periodList.length - (index + 2)]
        let pre1Period = periodList[periodList.length - (index + 1)]
        let currentPeriod = periodList[periodList.length - index]
        if (
          true
          && curtPercent(pre2Period) >= 0
          && pre2Period.close <= pre1Period.open + tweaks && pre2Period.close <= pre1Period.close
          && curtPercent(pre1Period) >= 0
          && curtPercent(currentPeriod) < 0
        ) {
          return true
        }
      }

      return false
    }




    function 绿空绿红(periodList, N = 1) {
      for (let index = 1; index <= N; index++) {
        let pre2Period = periodList[periodList.length - (index + 2)]
        let pre1Period = periodList[periodList.length - (index + 1)]
        let currentPeriod = periodList[periodList.length - index]
        if (
          true
          && curtPercent(pre2Period) < 0
          && pre2Period.close >= pre1Period.open
          && curtPercent(pre1Period) < 0
          && curtPercent(currentPeriod) > 0
        ) {
          return true
        }
      }

      return false
    }
    function KDJ金叉(periodList, N = 2) {
      for (let index = 1; index <= N; index++) {
        let pre2Period = periodList[periodList.length - (index + 2)]
        let pre1Period = periodList[periodList.length - (index + 1)]
        let currentPeriod = periodList[periodList.length - index]
        let res = (pre1Period.K < pre1Period.D) && (currentPeriod.K >= currentPeriod.D)
        if (res) return true
      }
      return false
    }
    function MACD金叉(periodList, N = 2) {
      for (let index = 1; index <= N; index++) {
        let pre2Period = periodList[periodList.length - (index + 2)]
        let pre1Period = periodList[periodList.length - (index + 1)]
        let currentPeriod = periodList[periodList.length - index]
        let res = pre1Period.bar < 0 && currentPeriod.bar > 0
        if (res) return true
      }
      return false
    }
    function MACD金叉2(periodList, N = 2) {
      for (let index = 1; index <= N; index++) {
        let pre2Period = periodList[periodList.length - (index + 2)]
        let pre1Period = periodList[periodList.length - (index + 1)]
        let currentPeriod = periodList[periodList.length - index]
        let res = (
          (pre1Period.bar < pre1Period.dea && currentPeriod.bar >= currentPeriod.dea)
          ||
          (pre1Period.bar < pre1Period.diff && currentPeriod.bar >= currentPeriod.diff)
        )
        if (res) return true
      }
      return false
    }
    function BIAS3金叉2(periodList, N = 2) {
      for (let index = 1; index <= N; index++) {
        let pre2Period = periodList[periodList.length - (index + 2)]
        let pre1Period = periodList[periodList.length - (index + 1)]
        let currentPeriod = periodList[periodList.length - index]
        let res = pre1Period.bias.bias3 < pre1Period.bias.bias2 && currentPeriod.bias.bias3 >= currentPeriod.bias.bias2
        if (res) return true
      }
      return false
    }
    function BIAS低位(periodList) {

      let pre2Period = periodList[periodList.length - 3]
      let pre1Period = periodList[periodList.length - 2]
      let currentPeriod = periodList[periodList.length - 1]

      return currentPeriod.bias.bias1 >= currentPeriod.bias.bias2 &&
        currentPeriod.bias.bias2 > currentPeriod.bias.bias3

    }
    function CCI金叉(periodList, N = 2) {
      if (periodList.length < 3) return false
      for (let index = 1; index <= N; index++) {
        let pre2Period = periodList[periodList.length - (index + 2)]
        let pre1Period = periodList[periodList.length - (index + 1)]
        let currentPeriod = periodList[periodList.length - index]
        let res = (pre1Period.cci.cci < -100 && currentPeriod.cci.cci >= -100) ||
          (pre1Period.cci.cci < 0 && currentPeriod.cci.cci >= 0)
        if (res) return true
      }
      return false

    }

    function checkMonth低位(periodList) {

      function 连续三月下跌(currentMonthList) {
        //包含自己前3个月
        let cut = 0
        for (let index = 1; index <= 3; index++) {
          let pre3Month = currentMonthList[currentMonthList.length - (index + 3)]
          let pre2Month = currentMonthList[currentMonthList.length - (index + 2)]
          let pre1Month = currentMonthList[currentMonthList.length - (index + 1)]
          let currentMonth = currentMonthList[currentMonthList.length - (index)]
          if (
            curtPercent(currentMonth) < 0 && curtPercent(pre1Month) < 0 && curtPercent(pre2Month) < 0 &&
            PtPPercent(pre1Month, currentMonth) < 0 &&
            PtPPercent(pre2Month, pre1Month) < 0 &&
            PtPPercent(pre3Month, pre2Month) < 0 &&

            currentMonth.close < currentMonth.ma5 && currentMonth.ma5 < pre1Month.ma5 &&
            pre1Month.close < pre1Month.ma5 && pre1Month.ma5 < pre2Month.ma5 &&

            currentMonth.J < pre1Month.J &&
            currentMonth.K < pre1Month.K
          ) {
            cut++
          }
        }
        return cut
      }

      let pre2Period = periodList[periodList.length - 3]
      let pre1Period = periodList[periodList.length - 2]
      let currentPeriod = periodList[periodList.length - 1]

      if (
        currentPeriod.dea < -50 && currentPeriod.diff < -50 &&
        (连续三月下跌(periodList) > 0 || PtPPercent(pre2Period, pre1Period) <= -15)
      ) return true


      return false
    }
