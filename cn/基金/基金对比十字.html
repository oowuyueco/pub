  <script>
    function addPSYToDataOptimized(data, period = 12, maPeriod = 6) {
      if (data.length < period) {
        //console.warn(`数据长度不足，至少需要${period}个交易日数据`);
        return data;
      }

      // 用于滑动窗口计算
      let upDaysCount = 0;
      let psySum = 0;
      const psyWindow = [];

      for (let i = 0; i < data.length; i++) {
        // 初始化属性
        data[i].psy = null;
        data[i].psyma = null;

        // 跳过第一天（没有前一日数据）
        if (i === 0) continue;

        // 判断当前日是否上涨
        const isUp = data[i].close > data[i - 1].close;

        // 如果是上涨日，计数增加
        if (isUp) {
          upDaysCount++;
        }

        // 当达到计算PSY的最小天数时
        if (i >= period - 1) {
          // 计算PSY
          const psyValue = (upDaysCount / period) * 100;
          data[i].psy = parseFloat(psyValue.toFixed(2));

          // 将PSY值添加到窗口用于计算移动平均
          psyWindow.push(data[i].psy);
          psySum += data[i].psy;

          // 如果窗口大小超过移动平均周期，移除最旧的值
          if (psyWindow.length > maPeriod) {
            const oldestPsy = psyWindow.shift();
            psySum -= oldestPsy;
          }

          // 计算PSYMA
          if (psyWindow.length === maPeriod) {
            data[i].psyma = parseFloat((psySum / maPeriod).toFixed(2));
          }

          // 准备滑动窗口：移除最旧的一天（如果已经不在当前PSY计算窗口内）
          // 检查i-period+1天（即将移出窗口的那天）是否上涨
          if (i >= period) {
            const dayToRemove = i - period + 1;
            if (dayToRemove > 0 && data[dayToRemove].close > data[dayToRemove - 1].close) {
              upDaysCount--;
            }
          }
        }
      }

      return data;
    }

    Array.prototype.cal9转 = function (kline交易日, priod, N = 5) {
      var candleList = this
      if (candleList.length < 20) return candleList

      for (let endIndex = candleList.length - 1; candleList.length - N <= endIndex; endIndex--) {

        if (endIndex == candleList.length - 1) {
          if (priod == "week" && new Date(kline交易日).getDay() < 3) continue
          if (priod == "month" && +kline交易日.substring(8, 10) < 18) continue
        }

        let is9转up = true
        let is9转down = true
        for (var i = 0; i <= 8; i++) {
          is9转down = is9转down && (candleList[endIndex - i - 4].close > candleList[endIndex - i].close)
          is9转up = is9转up && (candleList[endIndex - i - 4].close < candleList[endIndex - i].close)
        }

        if (is9转up) {
          for (var i = 0; i <= 8; i++)
            candleList[endIndex - i]["is9转up"] = 9 - i
          //break
        }
        if (is9转down) {
          for (var i = 0; i <= 8; i++)
            candleList[endIndex - i]["is9转down"] = 9 - i
          //break
        }
      }

      return candleList
    }
    function calDayWeekMonthKline(nameCode, kline交易日) {
      nameCode.currentDayList = []
      nameCode.currentWeekList = []
      nameCode.currentMonthList = []
      let currentDayIndex = nameCode.dayDatas.findIndex(ele => { return ele.date == kline交易日 });
      if (currentDayIndex > 70) {
        let dayStart = (currentDayIndex + 1) - 100 > 0 ? (currentDayIndex + 1) - 100 : 0 //day计算最近100天
        nameCode.currentDayList = nameCode.dayDatas.slice(dayStart, currentDayIndex + 1)
          .calBoll().cal9转(kline交易日, "day").calKdj().calMacd().maN(10, "close")
        nameCode.currentDayList = calculationBias(nameCode.currentDayList)
        nameCode.currentDayList = calculationCci(nameCode.currentDayList)

        let weekDayStart = (currentDayIndex + 1) - 500 > 0 ? (currentDayIndex + 1) - 500 : 0 //week最近100周500天
        nameCode.currentWeekList = dayToPeriod(nameCode.dayDatas.slice(weekDayStart, currentDayIndex + 1), "week")
          .calBoll().cal9转(kline交易日, "week").calKdj().calMacd().maN(10, 'close')
        nameCode.currentWeekList = calculationBias(nameCode.currentWeekList)
        nameCode.currentWeekList = calculationCci(nameCode.currentWeekList)
        nameCode.currentWeekList = addPSYToDataOptimized(nameCode.currentWeekList, 12, 6);

        let monthDayStart = 0 //month全部
        nameCode.currentMonthList = dayToPeriod(nameCode.dayDatas.slice(monthDayStart, currentDayIndex + 1), "month")
          .calBoll().cal9转(kline交易日, "month").calKdj().calMacd()
          .maN(3, 'close').maN(5, 'close').maN(10, 'close').maN(80, 'close')
        nameCode.currentMonthList = calculationBias(nameCode.currentMonthList)
        nameCode.currentMonthList = calculationCci(nameCode.currentMonthList)
        nameCode.currentMonthList = addPSYToDataOptimized(nameCode.currentMonthList, 12, 6);
      }
      return nameCode
    }

    
    function volMaPre(N = 5, periodList, endIndex) {
      if (periodList.length < N + 1) return 0
      let sum = 0
      for (var i = 0; i < N; i++) {
        let currentPeriod = periodList.at(endIndex - i)
        sum += currentPeriod.volume
      }
      return sum / N
    }

    function VOL5_10死叉(periodList, N = 2, tweaks = 0) {
      for (let index = 1; index <= N; index++) {
        let res = volMaPre(5, periodList, 0 - index - 1) > volMaPre(10, periodList, 0 - index - 1) &&
          volMaPre(5, periodList, 0 - index) < volMaPre(10, periodList, 0 - index)
        if (res) return true
      }
      return false
    }
    function KDJ死叉(periodList, N = 2, tweaks = 0) {
      for (let index = 1; index <= N; index++) {
        let pre2Period = periodList[periodList.length - (index + 2)]
        let pre1Period = periodList[periodList.length - (index + 1)]
        let currentPeriod = periodList[periodList.length - index]
        let res = (pre1Period.K > pre1Period.D) && (currentPeriod.K <= currentPeriod.D + tweaks)
        if (res) return true
      }
      return false
    }
    function MACD死叉(periodList, N = 2, tweaks = 0) {
      for (let index = 1; index <= N; index++) {
        let pre2Period = periodList[periodList.length - (index + 2)]
        let pre1Period = periodList[periodList.length - (index + 1)]
        let currentPeriod = periodList[periodList.length - index]
        let res = pre1Period.bar > 0 && currentPeriod.bar <= 0 + tweaks
        if (res) return true
      }
      return false
    }
    function CCI死叉(periodList, N = 2, tweaks = 0) {
      if (periodList.length < 3) return false
      for (let index = 1; index <= N; index++) {
        let pre2Period = periodList[periodList.length - (index + 2)]
        let pre1Period = periodList[periodList.length - (index + 1)]
        let currentPeriod = periodList[periodList.length - index]
        let res = (pre1Period.cci.cci > 100 && currentPeriod.cci.cci < 100) ||
          (pre1Period.cci.cci > 0 && currentPeriod.cci.cci <= 0)
        if (res) return true
      }
      return false

    }
    function 红空红绿(periodList, N = 1, tweaks = 0) {
      for (let index = 1; index <= N; index++) {
        let pre2Period = periodList[periodList.length - (index + 2)]
        let pre1Period = periodList[periodList.length - (index + 1)]
        let currentPeriod = periodList[periodList.length - index]
        if (
          true
          && curtPercent(pre2Period) >= 0
          && pre2Period.close <= pre1Period.open + tweaks && pre2Period.close <= pre1Period.close
          && curtPercent(pre1Period) >= 0
          && curtPercent(currentPeriod) < 0
        ) {
          return true
        }
      }

      return false
    }

    function ocLowest(period) {
      return period.open > period.close ? period.close : period.open
    }
    function ocHighest(period) {
      return period.open > period.close ? period.open : period.close
    }
    function preN矩形穿ups(periodList, N = 4, tweaks = 10) {
      if (periodList.length < 6) return false
      let pre3Period = periodList[periodList.length - 4]
      let pre2Period = periodList[periodList.length - 3]
      let pre1Period = periodList[periodList.length - 2]
      let currentPeriod = periodList[periodList.length - 1]

      //2018-01-31 shagnzheng
      for (index = -1; index >= (0 - N); index--) {
        if (ocHighest(periodList.at(index)) + tweaks >= periodList.at(index).ups)
          return true
      }

      return false
    }
    function preN矩形穿lows(periodList, N = 4, tweaks = 10) {
      if (periodList.length < 6) return false
      let pre3Period = periodList[periodList.length - 4]
      let pre2Period = periodList[periodList.length - 3]
      let pre1Period = periodList[periodList.length - 2]
      let currentPeriod = periodList[periodList.length - 1]

      for (index = -1; index >= (0 - N); index--) {
        if (ocLowest(periodList.at(index)) <= periodList.at(index).lows)
          return true
      }

      return false
    }
    function preN十字星(periodList, N = 2) {
      if (!periodList || periodList.length < 3) return false
      for (let index = 1; index <= N; index++) {
        let currentPeriod = periodList[periodList.length - index]
        let res = (
          +Math.abs(curtPercent(currentPeriod)) < 1 &&   //1   //当期涨跌幅 阳线阴线 短矩形   '0.57,8.88'  0.35,11.96
          +Math.abs(curtAmp(currentPeriod)) < 20          //23 //矩形占比小
        )
        if (res) return true
      }
      return false
    }

    function VOL5_10金叉(periodList, N = 2, tweaks = 0) {
      for (let index = 1; index <= N; index++) {
        let res = volMaPre(5, periodList, 0 - index - 1) < volMaPre(10, periodList, 0 - index - 1) &&
          volMaPre(5, periodList, 0 - index) > volMaPre(10, periodList, 0 - index)
        if (res) return true
      }
      return false
    }
    function 绿空绿红(periodList, N = 1) {
      for (let index = 1; index <= N; index++) {
        let pre2Period = periodList[periodList.length - (index + 2)]
        let pre1Period = periodList[periodList.length - (index + 1)]
        let currentPeriod = periodList[periodList.length - index]
        if (
          true
          && curtPercent(pre2Period) < 0
          && pre2Period.close >= pre1Period.open
          && curtPercent(pre1Period) < 0
          && curtPercent(currentPeriod) > 0
        ) {
          return true
        }
      }

      return false
    }
    function KDJ金叉(periodList, N = 2) {
      for (let index = 1; index <= N; index++) {
        let pre2Period = periodList[periodList.length - (index + 2)]
        let pre1Period = periodList[periodList.length - (index + 1)]
        let currentPeriod = periodList[periodList.length - index]
        let res = (pre1Period.K < pre1Period.D) && (currentPeriod.K >= currentPeriod.D)
        if (res) return true
      }
      return false
    }
    function MACDpre金叉(periodList, N = 2) {
      for (let index = 1; index <= N; index++) {
        let pre2Period = periodList[periodList.length - (index + 2)]
        let pre1Period = periodList[periodList.length - (index + 1)]
        let currentPeriod = periodList[periodList.length - index]
        let res = (
          (pre1Period.bar < pre1Period.dea && currentPeriod.bar >= currentPeriod.dea)
          ||
          (pre1Period.bar < pre1Period.diff && currentPeriod.bar >= currentPeriod.diff)
        )
        if (res) return true
      }
      return false
    }
    function MACD金叉(periodList, N = 2) {
      for (let index = 1; index <= N; index++) {
        let pre2Period = periodList[periodList.length - (index + 2)]
        let pre1Period = periodList[periodList.length - (index + 1)]
        let currentPeriod = periodList[periodList.length - index]
        let res = pre1Period.bar < 0 && currentPeriod.bar > 0
        if (res) return true
      }
      return false
    }
    function BIAS金叉0(periodList, attr = "bias1", N = 2) {
      for (let index = 1; index <= N; index++) {
        let pre2Period = periodList[periodList.length - (index + 2)]
        let pre1Period = periodList[periodList.length - (index + 1)]
        let currentPeriod = periodList[periodList.length - index]
        let res = pre1Period.bias[attr] < 0 && currentPeriod.bias[attr] >= 0
        if (res) return true
      }
      return false
    }
    function BIAS低位(periodList) {

      let pre2Period = periodList[periodList.length - 3]
      let pre1Period = periodList[periodList.length - 2]
      let currentPeriod = periodList[periodList.length - 1]

      return currentPeriod.bias.bias1 >= currentPeriod.bias.bias2 &&
        currentPeriod.bias.bias2 > currentPeriod.bias.bias3

    }
    function CCI金叉(periodList, N = 2) {
      if (periodList.length < 3) return false
      for (let index = 1; index <= N; index++) {
        let pre2Period = periodList[periodList.length - (index + 2)]
        let pre1Period = periodList[periodList.length - (index + 1)]
        let currentPeriod = periodList[periodList.length - index]
        let res = (pre1Period.cci.cci < -100 && currentPeriod.cci.cci >= -100) ||
          (pre1Period.cci.cci < 0 && currentPeriod.cci.cci >= 0)
        if (res) return true
      }
      return false

    }

    function bollAllUp(periodList) {
      let pre1Period = periodList[periodList.length - 2]
      let currentPeriod = periodList[periodList.length - 1]
      return pre1Period.ups < currentPeriod.ups &&
        pre1Period.mas < currentPeriod.mas &&
        pre1Period.lows < currentPeriod.lows
    }
    function kdjAllUp(periodList) {
      let pre1Period = periodList[periodList.length - 2]
      let currentPeriod = periodList[periodList.length - 1]
      return pre1Period.K < currentPeriod.K &&
        pre1Period.D < currentPeriod.D &&
        pre1Period.J < currentPeriod.J
    }
    function macdAllUp(periodList) {
      let pre1Period = periodList[periodList.length - 2]
      let currentPeriod = periodList[periodList.length - 1]
      return pre1Period.bar < currentPeriod.bar &&
        pre1Period.diff < currentPeriod.diff &&
        pre1Period.dea < currentPeriod.dea
    }
    function biasAllUp(periodList) {
      let pre1Period = periodList[periodList.length - 2]
      let currentPeriod = periodList[periodList.length - 1]
      return pre1Period.bias.bias1 < currentPeriod.bias.bias1 &&
        pre1Period.bias.bias2 < currentPeriod.bias.bias2 &&
        pre1Period.bias.bias3 < currentPeriod.bias.bias3
    }
    function preNHighestAttr(periodList, N = 7, attr = "J") {
      let highest = -10000
      for (let index = periodList.length - 1; index >= periodList.length - N; index--) {
        let currentJVal = periodList[index][attr]
        if (currentJVal >= highest) highest = currentJVal
      }
      return highest
    }


    let 指数数据 = {};
    let dataName = decodeURI(getQueryVariable("name"));
    console.log(dataName)
    if (dataName == "沪深300" || dataName == "false") 指数数据.dayDatas = 沪深300;
    if (dataName == "上证") 指数数据.dayDatas = 上证;
    if (dataName == "上证50") 指数数据.dayDatas = 上证50;
    if (dataName == "科创50") 指数数据.dayDatas = 科创50;
    if (dataName == "恒生") 指数数据.dayDatas = 恒生;


    let 十字低位 = []
    let 十字高位 = []
    for (let index = 100; index < 指数数据.dayDatas.length; index++) {
      const 指数Item = 指数数据.dayDatas[index];
      指数数据 = calDayWeekMonthKline(指数数据, 指数Item.date);

      let pre2Day = 指数数据.currentDayList.at(-3);
      let pre1Day = 指数数据.currentDayList.at(-2);
      let curDay = 指数数据.currentDayList.at(-1);

      let pre1Week = 指数数据.currentWeekList.at(-2);
      let curWeek = 指数数据.currentWeekList.at(-1);

      let pre3Month = 指数数据.currentMonthList.at(-4);
      let pre2Month = 指数数据.currentMonthList.at(-3);
      let pre1Month = 指数数据.currentMonthList.at(-2);
      let curMonth = 指数数据.currentMonthList.at(-1);


      /*----------------------------------------------------------------------------------*/

      if (curDay.date.includes("2022-09-30") || curDay.date.includes("2021-05-31")) {
        //2019-01-02   2019-01-03    JD20   b1>b2>b3
        //2022-10-28   2022-10-31    JD20   b1>b2>b3
        //2024-02-02   2024-02-05    JD20   b1>b2>b3
        //2024-09-10 - 2024-09-23    JD20   b1>b2>b3   0>b2
      }

      function checkDay低位() {
        return (
          (curDay.J < 20 || curDay.D < 20) &&
          curDay.bias.bias1 > curDay.bias.bias2 &&
          curDay.bias.bias2 > curDay.bias.bias3 &&
          0 > curDay.bias.bias2
        )
      }

      if (
        preN矩形穿lows(指数数据.currentDayList, 7) &&
        (
          preN十字星(指数数据.currentDayList, 5) ||
          绿空绿红(指数数据.currentDayList) ||
          curtPercent(curDay) < -3.5 ||
          curDay.open < curDay.lows
        ) &&
        checkDay低位() &&
        preN矩形穿lows(指数数据.currentWeekList, 4) &&
        (
          preN十字星(指数数据.currentWeekList, 4) ||
          绿空绿红(指数数据.currentWeekList) ||
          curtPercent(curWeek) < -5 ||
          curWeek.open < curWeek.lows
        ) && curWeek.psyma < 60 &&
        preN矩形穿lows(指数数据.currentMonthList, 3) &&
        (
          preN十字星(指数数据.currentMonthList, 3) ||
          绿空绿红(指数数据.currentMonthList) ||
          ((curtPercent(pre1Week) < -5 || curtPercent(curWeek) < -5) && curtPercent(curMonth) < -6.5) ||
          curMonth.open < curMonth.lows
        ) &&
        curMonth.diff < 0 && curMonth.bar < 0 && curMonth.bias.bias1 < 0
        && curMonth.psy < curMonth.psyma && curMonth.psyma < 60

        && !(ocHighest(curDay) > curDay.ma10 && curtPercent(curDay) < 0) //2011-10-11   
        && !(KDJ死叉(指数数据.currentDayList) && curDay.D > 23) //2011-10-03  2011-10-04 2022-03-15
        && !(curtPercent(curDay) > 0 && curtPercent(curWeek) > 0 && curtPercent(curMonth) > 0)
      ) {
        十字低位.push([curDay.date, -50, "type0",])
      }

      /*----------------------------------------------------------------------------------*/

      function checkDay高位() {
        return (
          (curDay.J > 80 || curDay.D > 80) &&
          curDay.bias.bias1 < curDay.bias.bias2 &&
          curDay.bias.bias2 < curDay.bias.bias3 &&
          0 < curDay.bias.bias2
        )
      }

      if (
        preN矩形穿ups(指数数据.currentDayList, 7) &&
        preN十字星(指数数据.currentDayList, 5) &&
        curDay.diff > 0 && curDay.dea > 0 && curDay.bar > 0 && curDay.bias.bias1 > 0 &&
        checkDay高位() &&

        VOL5_10死叉(指数数据.currentWeekList)
        && pre1Week.psy > pre1Week.psyma && curWeek.psy < curWeek.psyma
        && curWeek.diff > 0 && curWeek.bar > 0 && curWeek.bias.bias1 > 0
        && curWeek.psyma > 50 && curWeek.D > 65

        && curMonth.bar > 0 && curMonth.bias.bias1 > 0
        && curMonth.psy > curMonth.psyma && curMonth.psyma > 40

        && !(
          curtPercent(pre3Month) > 0 && curtPercent(pre2Month) > 0 && curtPercent(pre1Month) > 0 &&
          pre3Month.volume < pre2Month.volume && pre2Month.volume < pre1Month.volume &&
          pre1Month.diff < curMonth.diff
        )

      ) {
        十字高位.push([curDay.date, 330])
      }

    }


    console.log(十字高位, 十字低位)
